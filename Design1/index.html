<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 3</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="art-section">
        <div class="art-container">
          <h1>Exploer Art Work</h1>

          <div class="card-wrapper">
            <div class="card">
              <img src="monocular.png" alt="monocular" />
              <h2>Monocular</h2>
              <p>54.8k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
            <div class="card">
              <img src="hornsmask.png" alt="hornsmask" />
              <h2>Horns Mask</h2>
              <p>32.4k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
            <div class="card">
              <img src="lightmoon.png" alt="lightmoon" />
              <h2>Light Moon</h2>
              <p>86.6k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
            <div class="card">
              <img src="skullwire.png" alt="skullwire" />
              <h2>Skull Wire</h2>
              <p>78.8k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
            <div class="card">
              <img src="spiderman.png" alt="spiderman" />
              <h2>Spiderman</h2>
              <p>24.8k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
            <div class="card">
              <img src="deadpool.png" alt="deadpool" />
              <h2>Deadpool</h2>
              <p>59.7k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
            <div class="card">
              <img src="Whiteeye.png" alt="Whiteeye" />
              <h2>White Eye</h2>
              <p>45.7k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
            <div class="card">
              <img src="plasticspine.png" alt="plasticspine" />
              <h2>Plastic Spinal</h2>
              <p>95.6k <span><i class="ri-heart-3-line"></i></span></p>
              <button>Place Bid</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
